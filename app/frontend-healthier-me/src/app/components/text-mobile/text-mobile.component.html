<div class="tw-w-full tw-h-full tw-flex tw-flex-col tw-fixed tw-bottom-0 tw-left-0">
  <div #scrollContainer class="tw-w-full tw-h-full tw-overflow-y-auto tw-flex tw-justify-center tw-items-start tw-mb-4 tw-mt-12">
    <div class="tw-w-[80ch] tw-max-w-full tw-flex tw-flex-col tw-justify-start tw-items-stretch tw-gap-6 tw-mx-4">
      @for (message of messages; track message) {
        @if (message.message.trim()) {
          @switch (message.role) {
            @case (user) {
              <app-text-user [message]="message"></app-text-user>
            }
            @case (system) {
              <app-text-system [message]="message"></app-text-system>
            }
          }
        }
      }
    </div>
  </div>

  <div class="tw-w-full tw-flex tw-justify-center tw-px-4 tw-mb-4">
    <div class="tw-w-[80dvw] tw-max-w-[800px]">
      <app-text-input />
    </div>
  </div>
</div>
